[tools]
# Languages
bun = "1.3.5"
rust = "1.92.0"

# Editors / Formatters
shfmt = "latest"
stylua = "latest"
prettier = "latest"
taplo = "latest"

# Frameworks / SDKs
uv = "0.11.7"

[tasks.install]
description = "Run the dotfiles symlink setup"
file = "scripts/install.sh"

[tasks.source]
description = "Emit shell snippets for eval-style sourcing"
run = '''
if [ -t 1 ]; then
  echo 'NOTE: This is auto-loaded from .zshrc, so you usually do not need to run it manually. If you do run it via mise, use `eval "$(mise run -q source)"` to apply exports to the current shell.' 1>&2
  exit 0
fi

bash scripts/source.sh
'''

[tasks.install-bun]
description = "Link Bun globals and install Bun dependencies"
file = "scripts/install-bun.sh"

[tasks.bun-sync]
description = "Update Bun global packages to their latest versions"
run = "bun update -g --latest"

[tasks.brew-sync]
description = "Upgrade Homebrew packages and sync the tracked Brewfile"
run = ["brew upgrade", "brew bundle dump --file=homebrew/Brewfile --force"]

[tasks.mise-sync-global-tools]
description = "Update every tool declared in mise/config.global.toml to the latest remote version"
file = "scripts/update-mise-global-tools.sh"

[tasks.python-sync]
description = "Sync Python development dependencies with uv"
run = "uv sync --group dev"

[tasks.pre-commit-install]
description = "Install the repository pre-commit hook with uv"
run = [
  "uv sync --group dev",
  "uv run pre-commit install",
]

[tasks.check]
description = "Run all pre-commit checks with uv"
run = [
  "uv sync --group dev",
  "uv run pre-commit run -a",
]

[tasks.format]
description = "Format the repository"
run = '''
set -eu

missing_tools=""
for tool in stylua shfmt prettier taplo; do
  if ! command -v "$tool" >/dev/null 2>&1; then
    missing_tools="$missing_tools $tool"
  fi
done

if [ -n "$missing_tools" ]; then
  echo "Missing required formatter(s):$missing_tools" >&2
  echo "Install them first, then run: mise run format" >&2
  exit 1
fi

tmpdir="$(mktemp -d)"
trap 'rm -rf "$tmpdir"' EXIT

list_files() {
  output_file="$1"
  shift
  git ls-files -z -- "$@" > "$output_file"
}

run_if_any() {
  file_list="$1"
  shift
  if [ -s "$file_list" ]; then
    xargs -0 "$@" < "$file_list"
  fi
}

list_files "$tmpdir/lua" '*.lua'
list_files "$tmpdir/shell" '*.sh' '*.bash' '*.zsh'
list_files "$tmpdir/prettier" \
  '*.json' '*.jsonc' '*.md' '*.yaml' '*.yml' \
  ':(exclude)**/lazy-lock.json' \
  ':(exclude)**/*.lock'
list_files "$tmpdir/toml" \
  '*.toml' \
  ':(exclude)**/*.lock'

run_if_any "$tmpdir/lua" stylua
run_if_any "$tmpdir/shell" shfmt -w
run_if_any "$tmpdir/prettier" prettier --write
run_if_any "$tmpdir/toml" taplo fmt
'''
