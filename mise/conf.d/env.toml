[env]

# ===========================
# Generals
# ===========================

EDITOR = "nvim"
VISUAL = "{{env.EDITOR}}"


# ===========================
# CLI tools
# ===========================

BAT_THEME = "Nord"
BAT_STYLE = "changes,header,snip"
BAT_PAGER = "less -RF"

EZA_ICONS_AUTO = "1"   # Enable icons automatically
EZA_ICON_SPACING = "2"

FZF_DEFAULT_COMMAND = "rg --files --hidden --glob \"!.git\""
FZF_DEFAULT_OPTS = "--height=70% --layout=reverse --border=rounded --preview-window=down,60%,nowrap"
FZF_CTRL_T_OPTS = "--preview 'bat --style=numbers --color=always {}' --preview-window=down,60%,nowrap"

GAT_THEME = "nord"

GHQ_ROOT = "{{env.HOME}}/Git/ghq"


# ===========================
# Bookmarks
# ===========================

CHROME_BOOKMARKS_ROOT = "{{env.HOME}}/Library/Application Support/Google/Chrome"
SAFARI_BOOKMARKS_PLIST = "{{env.HOME}}/Library/Safari/Bookmarks.plist"


# ===========================
# Paths / Directories
# ===========================

GOPATH = "{{env.HOME}}/go"

ANDROID_SDK_ROOT = "{{env.HOME}}/Library/Android/sdk"
ANDROID_HOME = "{{env.ANDROID_SDK_ROOT}}"

DIR_BUN = "{{env.HOME}}/.bun"
DIR_BUN_BIN = "{{env.DIR_BUN}}/bin"
DIR_BUN_INSTALL = "{{env.DIR_BUN}}/install"
DIR_BUN_GLOBAL = "{{env.DIR_BUN_INSTALL}}/global"

DIR_CLAUDE_CODE = "{{env.HOME}}/.claude"
DIR_CLAUDE_CODE_SKILLS = "{{env.DIR_CLAUDE_CODE}}/skills"
DIR_CODEX = "{{env.HOME}}/.codex"
DIR_CODEX_SKILLS = "{{env.DIR_CODEX}}/skills"
DIR_GEMINI_CLI = "{{env.HOME}}/.gemini"
DIR_GEMINI_CLI_SKILLS = "{{env.DIR_GEMINI_CLI}}/skills"

DIR_LOCAL_BIN = "{{env.HOME}}/.local/bin"
DIR_MISE_TASKS = "{{env.HOME}}/.config/mise/tasks"

_.path = [
  "{{env.DIR_LOCAL_BIN}}",                   # Local
  "{{env.DIR_BUN_BIN}}",                     # Bun
  "{{env.HOME}}/.rd/bin",                    # Rancher Desktop
  "{{env.HOME}}/.pub-cache/bin",             # Dart CLI tools
  "{{env.GOPATH}}/bin",                      # Go
  "{{env.ANDROID_SDK_ROOT}}/platform-tools", # AndroidStudio adb/fastboot
]
