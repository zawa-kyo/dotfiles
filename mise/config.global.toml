[tools]
# Languages
bun = "1"
deno = "2"
go = "1"
java = "26"
lua = "5"
node = "24"
python = "3"
ruby = "3"
rust = "1"

# Editors / dev tools
neovim = "0"
tree-sitter = "0"
zellij = "0"

# Frameworks / SDKs
flutter = "3.41.2-stable"
maestro = "cli-2.4.0"
uv = "0"

# CLI tools
actionlint = "latest"
atuin = "latest"
aws-cli = { version = "latest", symlink_bins = "true" }
bat = "latest"
delta = "latest"
eza = "latest"
fastfetch = "latest"
fd = "latest"
ffmpeg = "latest"
fzf = "latest"
gh = "latest"
ghq = "latest"
gitleaks = "latest"
jq = "latest"
lazygit = "latest"
ripgrep = "latest"
sheldon = "latest"
shellcheck = "latest"
starship = "latest"
yazi = "latest"
zoxide = "latest"

[settings]
lockfile = true
lockfile_platforms = ["macos-arm64", "linux-x64"]
minimum_release_age = "7d"

[env]
GOPATH = "{{env.HOME}}"

ANDROID_SDK_ROOT = "{{env.HOME}}/Library/Android/sdk"
ANDROID_HOME = "{{env.ANDROID_SDK_ROOT}}"

DIR_CLAUDE_CODE = "{{env.HOME}}/.claude"
DIR_CLAUDE_CODE_SKILLS = "{{env.DIR_CLAUDE_CODE}}/skills"
DIR_CODEX = "{{env.HOME}}/.codex"
DIR_CODEX_SKILLS = "{{env.DIR_CODEX}}/skills"
DIR_GEMINI_CLI = "{{env.HOME}}/.gemini"
DIR_GEMINI_CLI_SKILLS = "{{env.DIR_GEMINI_CLI}}/skills"

_.path = [
  "{{env.HOME}}/.local/bin",                 # Local
  "{{env.HOME}}/.bun/bin",                   # Bun
  "{{env.HOME}}/.rd/bin",                    # Rancher Desktop
  "{{env.HOME}}/.pub-cache/bin",             # Dart CLI tools
  "{{env.GOPATH}}/bin",                      # Go
  "{{env.ANDROID_SDK_ROOT}}/platform-tools", # AndroidStudio adb/fastboot
]
