[tools]
# Languages
bun = "1.3.12"
deno = "2.7.12"
go = "1.26.2"
java = "26.0.0"
lua = "5.5.0"
node = "24.14.1"
python = "3.14.4"
ruby = "3.4.9"
rust = "1.94.1"

# Editors / dev tools
neovim = "0.12.2"
stylua = "latest"
tree-sitter = "0.26.8"
zellij = "0.44.1"

# Automation / SDKs
flutter = "3.41.2-stable"
maestro = "cli-2.4.0"
uv = "0.11.6"

# CLI tools
actionlint = "latest"
atuin = "latest"
aws-cli = { version = "latest", symlink_bins = "true" }
bat = "latest"
delta = "latest"
eza = "latest"
fastfetch = "latest"
fd = "latest"
fzf = "latest"
gh = "latest"
ghq = "latest"
gitleaks = "latest"
jq = "latest"
lazygit = "latest"
ripgrep = "latest"
sheldon = "latest"
shellcheck = "latest"
starship = "latest"
yazi = "latest"
zoxide = "latest"

[env]
GOPATH = "{{env.HOME}}"
ANDROID_SDK_ROOT = "{{env.HOME}}/Library/Android/sdk"
ANDROID_HOME = "{{env.ANDROID_SDK_ROOT}}"
_.path = [
  "{{env.HOME}}/.local/bin",                 # Local
  "{{env.HOME}}/.bun/bin",                   # Bun
  "{{env.HOME}}/.rd/bin",                    # Rancher Desktop
  "{{env.HOME}}/.pub-cache/bin",             # Dart CLI tools
  "{{env.GOPATH}}/bin",                      # Go
  "{{env.ANDROID_SDK_ROOT}}/platform-tools", # AndroidStudio adb/fastboot
]
