[tools]
# Languages
bun = "1"
deno = "2"
go = "1"
java = "26"
lua = "5"
node = "24"
python = "3"
ruby = "3"
rust = "1"

# Editors / dev tools
neovim = "0"
tree-sitter = "0"
zellij = "0"

# Frameworks / SDKs
flutter = "3.41.9-stable"
fvm = "latest"
maestro = "cli-2"
uv = "0"

# CLI tools
actionlint = "latest"
apm = "latest"
atuin = "latest"
aws-cli = { version = "latest", symlink_bins = "true" }
bat = "latest"
copilot = "latest"
delta = "latest"
eza = "latest"
fastfetch = "latest"
fd = "latest"
ffmpeg = "latest"
fzf = "latest"
gat = "latest"
gh = "latest"
ghq = "latest"
gitleaks = "latest"
git-lfs = "latest"
gping = "latest"
jq = "latest"
lazygit = "latest"
procs = "latest"
pouch = { version = "latest", minimum_release_age = "0d" }
ripgrep = "latest"
sheldon = "latest"
shellcheck = "latest"
starship = "latest"
vhs = "latest"
tmux = "latest"
yazi = "latest"
zoxide = "latest"

[tool_alias]
apm = "github:microsoft/apm"
fvm = "aqua:leoafarias/fvm"
gat = "github:koki-develop/gat"
procs = "aqua:dalance/procs"
pouch = "github:zawa-kyo/pouch"
ttyd = "github:tsl0922/ttyd"
vhs = "github:charmbracelet/vhs"
