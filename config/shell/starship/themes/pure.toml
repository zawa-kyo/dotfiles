palette = "colors"

format = """
${custom.directory}\
${custom.git_branch}\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[cmd_duration]
disabled = false
format = '[  $duration ]($style)'
min_time = 1000                    # ms
style = "bold yellow"

[directory]
disabled = true
style = "bold green"

[custom.directory]
command = "starship-directory"
format = "[$output ]($style)"
style = "bold green"
when = "true"

[custom.git_branch]
command = "starship-git-branch"
format = "[on ]($foreground)[$output]($style)"
style = "bold pink"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"

[git_status]
format = "[ $all_status$ahead_behind]($style)"
style = "bold pink"
conflicted = ""
ahead = "⇡:${count} "
behind = "⇣:${count} "
diverged = "⇡:${ahead_count} ⇣:${behind_count} "
up_to_date = ""
untracked = ":${count} "
stashed = ""
modified = ":${count} "
staged = ":${count} "
renamed = "󰑕:${count} "
deleted = "󰆴:${count} "

[palettes.colors]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#FFD743"
